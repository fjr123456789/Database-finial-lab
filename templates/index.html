{% extends "base.html" %}

{#{% block title %}首页 - 图书馆管理系统{% endblock %}#}

{% block content %}
<div class="row justify-content-center text-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px;">
            <div class="card-body p-5">
                <h1 class="display-4 mb-3">
                    <i class="fas fa-book-open"></i> 图书馆管理系统
                </h1>
                <p class="lead">欢迎使用图书馆信息管理系统，高效管理图书借阅</p>
                <hr class="my-4" style="background: rgba(255,255,255,0.3);">
                <p>请选择您的身份登录系统</p>
                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <a href="{{ url_for('student_login') }}" class="btn btn-light btn-lg">
                        <i class="fas fa-user-graduate me-2"></i> 学生登录
                    </a>
                    <a href="{{ url_for('student_register') }}" class="btn btn-outline-light btn-lg">
                        <i class="fas fa-user-plus me-2"></i> 学生注册
                    </a>
                    <a href="{{ url_for('admin_login') }}" class="btn btn-warning btn-lg">
                        <i class="fas fa-user-shield me-2"></i> 管理员登录
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
