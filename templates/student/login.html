{% extends "base.html" %}

{% block title %}学生登录{% endblock %}

{% block content %}
    <div class="box">
        <div class="left"></div>
        <div class="right">
            <h4>登录</h4>
            <form method="POST">
                <input name="student_id" class="acc" type="text" placeholder="学号" autocomplete="off">
                <input name="password" class="acc" type="password" placeholder="密码" autocomplete="off">
                <input class="Login" type="submit" value="登录">
            </form>
            <div class="fn">
                <a href="{{ url_for('student_register') }}">注册账号</a>
            </div>
        </div>

    </div>
{% endblock %}
