{% extends "base.html" %}

{% block title %}管理员仪表盘{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-warning">
            <div class="card-body">
                <h4><i class="fas fa-user-shield me-2"></i> 欢迎，{{ session.admin_name }}！</h4>
                <p class="mb-0">管理员面板 - 系统总览</p>
            </div>
        </div>
    </div>
</div>

<div class="row g-4">
    <div class="col-md-3">
        <div class="stat-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <i class="fas fa-book fa-2x mb-2"></i>
            <div class="stat-number">{{ total_books }}</div>
            <div class="stat-label">总藏书</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
            <i class="fas fa-users fa-2x mb-2"></i>
            <div class="stat-number">{{ total_students }}</div>
            <div class="stat-label">注册学生</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
            <i class="fas fa-hand-holding-heart fa-2x mb-2"></i>
            <div class="stat-number">{{ active_borrows }}</div>
            <div class="stat-label">当前借阅</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
            <i class="fas fa-exclamation-triangle fa-2x mb-2"></i>
            <div class="stat-number">{{ overdue_count }}</div>
            <div class="stat-label">逾期未还</div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="fas fa-chart-line text-info me-2"></i> 最近借阅</h5>
            </div>
            <div class="card-body">
                <p class="text-muted text-center py-3">点击上方菜单查看更多功能</p>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="fas fa-bell text-warning me-2"></i> 系统通知</h5>
            </div>
            <div class="card-body">
                <p class="text-muted text-center py-3">欢迎使用图书馆管理系统</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
