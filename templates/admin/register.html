{% extends "base.html" %}

{% block title %}学生注册{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg" style="border-radius: 20px;">
            <div class="card-header bg-white border-0 text-center pt-4">
                <i class="fas fa-user-plus fa-4x text-success"></i>
                <h3 class="mt-3">学生注册</h3>
                <p class="text-muted">加入图书馆，开启阅读之旅</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" onsubmit="return validateForm()">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">学号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="student_id" id="student_id" placeholder="请输入学号" required>
                            <small class="text-danger" id="student_id_error" style="display: none;"></small>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="name" id="name" placeholder="请输入真实姓名" required>
                            <small class="text-danger" id="name_error" style="display: none;"></small>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="password" id="password" placeholder="至少6位" required>
                            <div class="progress mt-2" style="height: 5px;">
                                <div class="progress-bar" id="strengthBar" style="width: 0%"></div>
                            </div>
                            <small class="text-muted" id="strengthText"></small>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="confirm_password" id="confirm_password" required>
                            <small class="text-danger" id="confirm_error" style="display: none;"></small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">手机号</label>
                            <input type="tel" class="form-control" name="phone" id="phone" placeholder="选填">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" name="email" id="email" placeholder="选填">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="agree" required>
                                <label class="form-check-label" for="agree">
                                    我已阅读并同意 <a href="#">《用户协议》</a>
                                </label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">
                        <i class="fas fa-user-plus me-2"></i> 立即注册
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('student_login') }}" class="text-decoration-none">已有账号？去登录</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function validateForm() {
    let isValid = true;
    
    // 学号验证
    const studentId = document.getElementById('student_id').value;
    if (!studentId) {
        showError('student_id', '请输入学号');
        isValid = false;
    } else if (!/^\d{6,}$/.test(studentId)) {
        showError('student_id', '学号至少6位数字');
        isValid = false;
    } else {
        hideError('student_id');
    }
    
    // 姓名验证
    const name = document.getElementById('name').value;
    if (!name) {
        showError('name', '请输入姓名');
        isValid = false;
    } else if (name.length < 2) {
        showError('name', '姓名至少2个字符');
        isValid = false;
    } else {
        hideError('name');
    }
    
    // 密码验证
    const password = document.getElementById('password').value;
    if (!password) {
        showError('confirm', '请输入密码');
        isValid = false;
    } else if (password.length < 6) {
        showError('confirm', '密码至少6位');
        isValid = false;
    } else {
        hideError('confirm');
    }
    
    // 确认密码
    const confirm = document.getElementById('confirm_password').value;
    if (password !== confirm) {
        showError('confirm', '两次密码不一致');
        isValid = false;
    }
    
    // 协议勾选
    if (!document.getElementById('agree').checked) {
        alert('请阅读并同意用户协议');
        isValid = false;
    }
    
    return isValid;
}

function showError(fieldId, message) {
    const errorSpan = document.getElementById(fieldId + '_error');
    if (errorSpan) {
        errorSpan.textContent = message;
        errorSpan.style.display = 'block';
    }
}

function hideError(fieldId) {
    const errorSpan = document.getElementById(fieldId + '_error');
    if (errorSpan) {
        errorSpan.style.display = 'none';
    }
}

// 密码强度检测
const passwordInput = document.getElementById('password');
const strengthBar = document.getElementById('strengthBar');
const strengthText = document.getElementById('strengthText');

passwordInput.addEventListener('input', function() {
    const password = this.value;
    let strength = 0;
    
    if (password.length >= 6) strength++;
    if (password.length >= 10) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[a-zA-Z]/.test(password)) strength++;
    if (/[^a-zA-Z0-9]/.test(password)) strength++;
    
    if (strength <= 2) {
        strengthBar.style.width = '25%';
        strengthBar.className = 'progress-bar bg-danger';
        strengthText.textContent = '弱';
    } else if (strength <= 4) {
        strengthBar.style.width = '50%';
        strengthBar.className = 'progress-bar bg-warning';
        strengthText.textContent = '中';
    } else {
        strengthBar.style.width = '100%';
        strengthBar.className = 'progress-bar bg-success';
        strengthText.textContent = '强';
    }
    
    if (password.length === 0) {
        strengthBar.style.width = '0%';
        strengthText.textContent = '';
    }
});

// 确认密码实时验证
document.getElementById('confirm_password').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    if (this.value && password !== this.value) {
        showError('confirm', '两次密码不一致');
    } else {
        hideError('confirm');
    }
});
</script>
{% endblock %}
